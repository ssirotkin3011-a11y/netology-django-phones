<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ phone.name }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            max-width: 480px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        h1 { margin: 0 0 16px; color: #333; }
        table { border-collapse: collapse; width: 100%; }
        td { padding: 8px 4px; border-bottom: 1px solid #eee; }
        td:first-child { color: #777; width: 140px; }
        td:last-child { font-weight: 500; }
        .back { display: inline-block; margin-bottom: 16px; text-decoration: none; color: #007bff; }
        .back:hover { text-decoration: underline; }
        .price { font-size: 1.4rem; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <a class="back" href="/catalog">← Назад в каталог</a>

    <div class="card">
        <h1>{{ phone.name }}</h1>
        <table>
            <tr>
                <td>Цена</td>
                <td class="price">{{ phone.price|floatformat:0 }} ₽</td>
            </tr>
            <tr>
                <td>Дата выхода</td>
                <td>{{ phone.release_date }}</td>
            </tr>
            <tr>
                <td>LTE</td>
                <td>{% if phone.lte_exists %}Есть{% else %}Нет{% endif %}</td>
            </tr>
            <tr>
                <td>Изображение</td>
                <td>{{ phone.image }}</td>
            </tr>
            <tr>
                <td>Slug</td>
                <td>{{ phone.slug }}</td>
            </tr>
        </table>
    </div>
</body>
</html>
